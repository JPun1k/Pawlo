<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SHKM_ULTIMATE_OVERDRIVE_V2.4</title>
    <style>
        :root {
            --neon: #00f2ff; --matrix: #00ff41; --gold: #ffcc00; --error: #ff003c;
            --bg: #010105; --glass: rgba(0, 242, 255, 0.08);
        }

        * { box-sizing: border-box; cursor: none; }
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background: var(--bg); color: white; 
            font-family: 'Consolas', monospace; overflow: hidden; 
            perspective: 2000px;
        }

        /* --- [ КУРСОР ТА ЕФЕКТИ ] --- */
        #cursor {
            position: fixed; width: 10px; height: 10px; border: 1px solid var(--neon);
            border-radius: 50%; pointer-events: none; z-index: 999999;
            transition: transform 0.1s; box-shadow: 0 0 15px var(--neon);
        }

        /* --- [ ФОН ТА ТУНЕЛЬ ДАНИХ ] --- */
        #m-canvas { position: absolute; inset: 0; z-index: 1; opacity: 0.2; }
        #tunnel { position: fixed; inset: 0; z-index: 2; display: none; background: url('https://media.giphy.com/media/oEI9uWUicKgR6/giphy.gif') center/cover; mix-blend-mode: overlay; opacity: 0.5; }
        .vignette {
            position: fixed; inset: 0; z-index: 3;
            background: radial-gradient(circle, transparent 30%, black 150%);
            pointer-events: none;
        }

        /* --- [ ГОЛОВНИЙ ТЕРМІНАЛ ] --- */
        .wrapper {
            position: relative; z-index: 100; display: flex; 
            justify-content: center; align-items: center; height: 100vh;
        }

        .terminal {
            width: 850px; background: var(--glass); border: 1px solid var(--neon);
            padding: 40px; position: relative;
            transform-style: preserve-3d;
            box-shadow: 0 0 50px rgba(0, 242, 255, 0.15);
            backdrop-filter: blur(25px);
            transition: transform 0.1s ease-out;
        }

        .terminal::before {
            content: ""; position: absolute; inset: -5px; border: 2px solid var(--neon);
            animation: borderPulse 1s infinite alternate; pointer-events: none; opacity: 0.3;
        }

        /* --- [ В'ЮПОРТ СКАНЕРА ] --- */
        .viewport {
            width: 100%; height: 400px; background: #000;
            border: 1px solid rgba(0, 242, 255, 0.5); position: relative;
            display: flex; justify-content: center; align-items: center; overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0, 242, 255, 0.1);
        }

        #preview { max-height: 95%; max-width: 95%; z-index: 5; display: none; }
        .laser { 
            position: absolute; width: 100%; height: 5px; background: var(--neon); 
            box-shadow: 0 0 30px var(--neon), 0 0 60px var(--neon); z-index: 10; display: none;
            animation: scanLoop 1.5s infinite ease-in-out;
        }

        /* --- [ ПРОГРЕС ] --- */
        .loading-zone { margin-top: 30px; display: none; }
        .progress-bar { width: 100%; height: 6px; background: rgba(255,255,255,0.05); border-radius: 3px; margin-top: 10px; overflow: hidden; }
        .progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--neon), #fff); box-shadow: 0 0 25px var(--neon); transition: 0.05s; }

        /* --- [ ВІКНО ІІ (AI MODAL) ] --- */
        #ai-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.95);
            z-index: 10000; display: none; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .ai-box {
            width: 550px; padding: 40px; border: 1px solid var(--neon);
            background: #050508; border-radius: 20px; box-shadow: 0 0 60px rgba(0, 242, 255, 0.2);
            position: relative; animation: modalEntrance 0.3s;
        }
        .ai-header { color: var(--neon); font-size: 14px; letter-spacing: 4px; border-bottom: 1px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }
        #ai-text { line-height: 1.8; font-size: 15px; color: #00ff41; min-height: 150px; }

        /* --- [ ЕФЕКТИ ЗЛАМУ ] --- */
        .glitch-flash { animation: glitchFlash 0.1s infinite !important; }
        .scatter-3d { transform: translate3d(var(--x), var(--y), var(--z)) rotateX(var(--rX)) rotateY(var(--rY)) scale(0) !important; opacity: 0 !important; transition: 1.5s cubic-bezier(0.55, 0.085, 0.68, 0.53) !important; }
        
        #white-out {
            position: fixed; inset: 0; background: white; z-index: 1000000;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }

        /* --- [ КАТСЦЕНА ] --- */
        #secret-scene {
            position: fixed; inset: 0; background: #000; z-index: 100000; 
            display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
        .shkm-h1 { font-size: clamp(80px, 15vw, 180px); font-weight: 900; color: #fff; text-shadow: 0 0 50px var(--matrix); margin: 0; animation: scaleUp 0.5s; }
        .thank-you { font-size: 24px; color: white; letter-spacing: 5px; margin-top: 20px; max-width: 700px; line-height: 1.5; }
        .gold-24 { font-size: clamp(120px, 20vw, 300px); color: var(--gold); text-shadow: 0 0 100px var(--gold); margin: -50px 0; font-weight: 900; animation: pulseGold 2s infinite; }

        .btn { background: none; border: 1px solid var(--neon); color: var(--neon); padding: 12px 30px; cursor: pointer; margin-top: 30px; font-family: inherit; transition: 0.3s; }
        .btn:hover { background: var(--neon); color: #000; box-shadow: 0 0 30px var(--neon); }

        /* --- [ АНІМАЦІЇ ] --- */
        @keyframes scanLoop { 0%, 100% { top: -5%; } 50% { top: 105%; } }
        @keyframes borderPulse { from { opacity: 0.2; } to { opacity: 0.6; } }
        @keyframes modalEntrance { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes glitchFlash { 0% { opacity: 1; filter: invert(1); } 50% { opacity: 0; filter: invert(0); } 100% { opacity: 1; } }
        @keyframes scaleUp { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        @keyframes pulseGold { 0% { text-shadow: 0 0 80px var(--gold); } 50% { text-shadow: 0 0 150px var(--gold), 0 0 180px #fff; } 100% { text-shadow: 0 0 80px var(--gold); } }
    </style>
</head>
<body>

<div id="cursor"></div>
<div id="white-out"></div>
<div class="vignette"></div>
<div id="tunnel"></div>
<canvas id="m-canvas"></canvas>

<div class="wrapper">
    <div class="terminal" id="main-terminal">
        <div style="display:flex; justify-content:space-between; color:var(--neon); font-size:11px; margin-bottom:20px; text-transform:uppercase; letter-spacing:2px;">
            <span>CORE_INITIALIZED...</span>
            <span id="clock">00:00:00</span>
        </div>

        <div class="viewport" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="laser" id="laser"></div>
            <div id="hint" style="text-align:center;">
                <h2 style="letter-spacing:15px; margin:0; font-size:22px;">SCAN DEVICE</h2>
                <p style="font-size:10px; opacity:0.4; margin-top:10px;">DROP IMAGE OR CLICK TO ANALYZE</p>
            </div>
            <img id="preview" src="">
        </div>

        <input type="file" id="file-input" hidden accept="image/*">

        <div class="loading-zone" id="load-box">
            <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--neon);">
                <span id="status">INIT_NEURAL_INTERFACE...</span>
                <span id="percent">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        </div>
    </div>
</div>

<div id="ai-modal">
    <div class="ai-box">
        <div class="ai-header">NEURAL_ANALYSIS_REPORT</div>
        <div id="ai-text"></div>
        <button class="btn" onclick="location.reload()">DISMISS_REPORT</button>
    </div>
</div>

<div id="secret-scene">
    <canvas id="fx-canvas" style="position:absolute; inset:0; z-index: 10;"></canvas>
    <div style="position:relative; z-index:100; text-align:center;">
        <h1 style="font-size:clamp(80px, 10vw, 150px); margin:0; text-shadow: 0 0 50px var(--matrix);">ШКМ</h1>
        <p class="thank-you">Дякуємо ШКМ і нашому вчителю за те,<br>що вчить нас!!</p>
        <h1 class="gold-24">24</h1>
        <button class="btn" onclick="location.reload()" style="border-color:white; color:white;">REBOOT_SYSTEM</button>
    </div>
</div>

<script>
    // --- [ КУРСОР ТА ПАРАЛАКС ] ---
    const cursor = document.getElementById('cursor');
    const term = document.getElementById('main-terminal');
    
    document.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
        
        // Потужний паралакс (навіть при завантаженні)
        const xAxis = (window.innerWidth / 2 - e.clientX) / 20;
        const yAxis = (window.innerHeight / 2 - e.clientY) / 20;
        term.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
    });

    // --- [ МАТРИЦЯ НА ФОНІ ] ---
    const canvas = document.getElementById('m-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const alphabet = "ABCDEF0123456789ШКМZP1";
    const drops = Array(Math.floor(canvas.width/20)).fill(1);
    function drawM() {
        ctx.fillStyle = 'rgba(1, 1, 5, 0.1)'; ctx.fillRect(0,0,canvas.width,canvas.height);
        ctx.fillStyle = '#0f0'; ctx.font = '15px monospace';
        drops.forEach((y, i) => {
            const text = alphabet[Math.floor(Math.random()*alphabet.length)];
            ctx.fillText(text, i*20, y*20);
            if(y*20 > canvas.height && Math.random() > 0.98) drops[i] = 0;
            drops[i]++;
        });
    }
    setInterval(drawM, 50);

    // --- [ ЛОГІКА СКАНУВАННЯ ] ---
    const fileInput = document.getElementById('file-input');
    const fill = document.getElementById('fill');
    const statusText = document.getElementById('status');
    const tunnel = document.getElementById('tunnel');
    
    fileInput.onchange = e => {
        const file = e.target.files[0];
        if(!file) return;

        // Підготовка
        document.getElementById('preview').src = URL.createObjectURL(file);
        document.getElementById('preview').style.display = 'block';
        document.getElementById('hint').style.display = 'none';
        document.getElementById('load-box').style.display = 'block';
        document.getElementById('laser').style.display = 'block';

        let p = 0;
        // Дуже швидке завантаження
        const speed = setInterval(() => {
            p += 2; // Прискорив у 2 рази
            fill.style.width = p + '%';
            document.getElementById('percent').innerText = p + '%';
            
            if(p === 20) statusText.innerText = "ACCESSING_MEMORY_BLOCKS...";
            if(p === 50) statusText.innerText = "PARSING_LAYER_DNA...";
            if(p === 80) statusText.innerText = "AI_PATTERN_MATCHING...";

            if(p >= 100) {
                clearInterval(speed);
                document.getElementById('laser').style.display = 'none';
                
                if(file.name.toLowerCase().startsWith("shkm")) {
                    // НАМАКСИМУМ: Запускаємо тунель та OVERDRIVE
                    tunnel.style.display = 'block';
                    triggerOverdrive();
                } else {
                    startAIAnalysis();
                }
            }
        }, 30);
    };

    // --- [ ДИНАМІЧНИЙ ІІ ОПИС ] ---
    function startAIAnalysis() {
        document.getElementById('ai-modal').style.display = 'flex';
        const aiBox = document.getElementById('ai-text');
        
        // Детальний опис (на максималках)
        const texts = [
            "Виявлено арт вашого OC. Нейромережа розпізнала унікальні X-зіниці та характерний шрам. Стиль малювання: кіберпанк-графіка. Рівень деталізації: Максимальний. Майстерність підтверджена.",
            "Об'єкт: Оригінальний арт. Переважають теплі тони. ІІ фіксує ручну майстерність та складні графічні лінії. Авторський стиль ШКМ підтверджено. Статус: Шедевр зафіксовано.",
            "Зображення ідентифіковано як художній концепт. Виявлено творчий підхід. Нейромережа розпізнала Ginger та Azure з Piscemalia. Рівень креативу: 10/10."
        ];
        
        const fullText = texts[Math.floor(Math.random()*texts.length)];
        let i = 0;
        aiBox.innerHTML = "";
        const typer = setInterval(() => {
            aiBox.innerHTML += fullText[i];
            i++;
            if(i >= fullText.length) clearInterval(typer);
        }, 20); // Прискорив друк
    }

    // --- [ УЛЬТИМАТИВНИЙ OVERDRIVE ] ---
    function triggerOverdrive() {
        term.style.animation = 'borderPulse 0.1s infinite'; // Надважливе миготіння
        statusText.innerText = "OVERLOAD_DETECTED!";
        statusText.style.color = "var(--error)";
        term.classList.add('system-failure');

        // Миготіння фону
        document.getElementById('m-canvas').style.opacity = '0';
        setTimeout(() => document.getElementById('m-canvas').style.opacity = '0.2', 100);

        setTimeout(() => {
            // Тотальний розпад (НАМАКСИМУМ)
            const elements = term.querySelectorAll('div, img, span, h2, p');
            elements.forEach(el => {
                // Випадковий 3D виліт
                el.style.setProperty('--x', (Math.random()*2000 - 1000) + 'px');
                el.style.setProperty('--y', (Math.random()*2000 - 1000) + 'px');
                el.style.setProperty('--z', (Math.random()*2000 + 1000) + 'px'); // Від тебе
                el.style.setProperty('--rX', (Math.random()*360) + 'deg');
                el.style.setProperty('--rY', (Math.random()*360) + 'deg');
                el.classList.add('scatter-3d');
            });

            setTimeout(() => {
                // Білий спалах "схлопування"
                document.getElementById('white-out').style.opacity = '1';
                
                setTimeout(() => {
                    document.querySelector('.wrapper').style.display = 'none';
                    document.getElementById('secret-scene').style.display = 'flex';
                    document.getElementById('white-out').style.opacity = '0';
                    tunnel.style.display = 'none';
                    startFX();
                }, 200);
            }, 1200);
        }, 1200);
    }

    // --- [ УЛЬТИМАТИВНИЙ 3D САЛЮТ ] ---
    function startFX() {
        const c = document.getElementById('fx-canvas');
        const x = c.getContext('2d');
        c.width = window.innerWidth; c.height = window.innerHeight;
        let particles = [];
        
        function create(tx, ty) {
            const color = `hsl(${Math.random()*360}, 100%, 60%)`;
            for(let i=0; i<80; i++) { // Більше частинок
                particles.push({
                    x: tx, y: ty, 
                    vx: (Math.random()-0.5)*30, // Швидше
                    vy: (Math.random()-0.5)*30, 
                    vz: Math.random()*10 - 5, // 3D вектор
                    size: Math.random()*5+1, // Більше
                    a: 1, color: color
                });
            }
        }

        function render() {
            x.fillStyle = 'rgba(0,0,0,0.1)'; x.fillRect(0,0,c.width,c.height);
            particles.forEach((p, i) => {
                p.x += p.vx; p.y += p.vy; 
                p.size *= (1 + p.vz/100); // 3D ефект розміру
                p.vz *= 0.98; // Вповільнення по Z
                p.a -= 0.01;
                
                x.globalAlpha = p.a; x.fillStyle = p.color;
                x.beginPath(); x.arc(p.x, p.y, Math.abs(p.size), 0, Math.PI*2); x.fill();
                if(p.a <= 0) particles.splice(i, 1);
            });
            if(Math.random() > 0.8) create(Math.random()*c.width, Math.random()*c.height);
            requestAnimationFrame(render);
        }
        render();
    }

    // Годинник (для динаміки)
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
</script>
</body>
</html>
