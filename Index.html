<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>SHKM_ULTIMATE_OVERDRIVE_V2.4</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="cursor"></div>
<div id="white-out"></div>
<div class="vignette"></div>
<div id="tunnel"></div>
<canvas id="m-canvas"></canvas>

<div class="wrapper">
    <div class="terminal" id="main-terminal">
        <div style="display:flex; justify-content:space-between; color:var(--neon); font-size:11px; margin-bottom:20px; text-transform:uppercase; letter-spacing:2px;">
            <span>CORE_INITIALIZED...</span>
            <span id="clock">00:00:00</span>
        </div>

        <div class="viewport" id="drop-zone" onclick="document.getElementById('file-input').click()">
            <div class="laser" id="laser"></div>
            <div id="hint" style="text-align:center;">
                <h2 style="letter-spacing:15px; margin:0; font-size:22px;">SCAN DEVICE</h2>
                <p style="font-size:10px; opacity:0.4; margin-top:10px;">DROP IMAGE OR CLICK TO ANALYZE</p>
            </div>
            <img id="preview" src="">
        </div>

        <input type="file" id="file-input" hidden accept="image/*">

        <div class="loading-zone" id="load-box">
            <div style="display:flex; justify-content:space-between; font-size:12px; color:var(--neon);">
                <span id="status">INIT_NEURAL_INTERFACE...</span>
                <span id="percent">0%</span>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        </div>
    </div>
</div>

<div id="ai-modal">
    <div class="ai-box">
        <div class="ai-header">NEURAL_ANALYSIS_REPORT</div>
        <div id="ai-text"></div>
        <button class="btn" onclick="location.reload()">DISMISS_REPORT</button>
    </div>
</div>

<div id="secret-scene">
    <canvas id="fx-canvas" style="position:absolute; inset:0; z-index: 10;"></canvas>
    <div style="position:relative; z-index:100; text-align:center;">
        <h1 style="font-size:clamp(80px, 10vw, 150px); margin:0; text-shadow: 0 0 50px var(--matrix);">ШКМ</h1>
        <p class="thank-you">Дякуємо ШКМ і нашому вчителю за те,<br>що вчить нас!!</p>
        <h1 class="gold-24">24</h1>
        <button class="btn" onclick="location.reload()" style="border-color:white; color:white;">REBOOT_SYSTEM</button>
    </div>
</div>
</body>
</html>
